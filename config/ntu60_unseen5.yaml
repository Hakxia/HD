seed: 2025
num_worker: 4
work_dir: ./exps/ctamp_ntu60_unseen5_best_known
phase: train
checkpoint_path: null

feeder: feeders.feeder.FeatureFeeder
train_feeder_args:
  path: ./data/sk_feats/shift_ntu60_5_r/
  split: train
test_feeder_args:
  path: ./data/sk_feats/shift_ntu60_5_r/
  split: val

optimizer: AdamW
learning_rate: 0.0001
weight_decay: 0.01
lr_scheduler: cosine
num_iter: 285
num_warmup: 50
max_grad_norm: 1.0

log_iter: 100
save_iter: 999999

batch_size: 128
test_batch_size: 256
gpu: 0
mixed_precision: null

num_classes: 60
unseen_label: 5
unseen_label_path: ./data/label_splits/ntu60/ru5.npy

class_name_path: ./data/class_lists/ntu60.csv
class_description_path: ./data/class_lists/ntu60_llm.txt
class_name_mode: csv_label
class_description_mode: raw
text_model_name_or_path: stabilityai/stable-diffusion-2-1-base
text_max_length: 35
text_encode_batch_size: 64

feature_dim: 256
num_groups: 16
model_dim: 256
depth: 4
num_heads: 8
mlp_ratio: 4.0
dropout: 0.1
permutation_seed: 2025

mask_ratios: [0.125, 0.25, 0.375]
test_mask_ratio: 0.0625
num_test_masks: 16
test_mask_seed: 0

num_hard_negatives: 4
hard_negative_pool_size: 15
energy_temperature: 0.1
completion_weight: 1.0
energy_weight: 1.0
huber_beta: 1.0

class_chunk_size: 5
diagnose_text_usage: false
